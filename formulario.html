<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario Test</title>
    <link rel="shortcut icon" href="./assets/images/test.ico" type="image/x-icon">

    <link href="./css/darkly.css" rel="stylesheet">
        <link href="./css/form.css" rel="stylesheet">
        
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script src="./js/form.js"></script>
</head>

<body>
    <nav class="navbar navbar-expand-lg bg-dark" data-bs-theme="dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">App Test</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarColor02"
                aria-controls="navbarColor02" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarColor02">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link active" href="./index.html">Inicio
                            <span class="visually-hidden">(current)</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="./formulario.html">Formulario Registro</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
    <br>

    <div class="container card">
        <p class="h3">Formulario de Registro</p>
        <br>
        
        <form id="formulario" method="POST">
            <div class="row">
                <div class="col">
                    <label for="nombre" class="form-label">Nombre:</label>
                    <input type="text" class="form-control" id="nombre" name="nombre">
                    <div class="invalid-feedback">
                        El campo NOMBRE es obligatorio.
                    </div>
                </div>
                <div class="col">
                    <label for="email" class="form-label">Email:</label>
                    <input type="email" class="form-control" id="email" name="email">
                    <div class="invalid-feedback">
                        El campo EMAIL es obligatorio.
                    </div>
                </div>
            </div>
            <br>

            <div class="row">
                <div class="col">
                    <label for="contrasena" class="form-label">Contraseña:</label>
                    <input type="password" class="form-control" id="contrasena" name="contrasena">
                    <div class="invalid-feedback">
                        El campo CONTRASEÑA es obligatorio.
                    </div>
                </div>
                <div class="col">
                    <label for="repetirContrasena" class="form-label">Repetir Contraseña:</label>
                    <input type="password" class="form-control" id="repetirContrasena" name="repetirContrasena">
                    <div class="invalid-feedback">
                        El campo REPETIR CONTRASEÑA es obligatorio.
                    </div>
                </div>
            </div>
            <br>

            <div class="row">
                <div class="col"></div>
                <div class="col d-flex justify-content-end">
                    <button type="reset" class="btn btn-secondary me-2" id="btnCancelar">Cancelar</button>
                    <button type="submit" class="btn btn-primary">Guardar</button>
                </div>
            </div>
        </form>
    </div>
</body>

</html>
