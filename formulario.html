<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario Test</title>
    <link rel="shortcut icon" href="./assets/images/test.ico" type="image/x-icon">

    <link href="./css/darkly.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script src="./js/form.js"></script>
</head>

<body>
    <div class="container">
        <h1>Formulario Test</h1>
        <!-- <form id="formulario" action="http://localhost:3000/guardar" method="POST"> -->
        <form id="formulario" method="POST">
            <div class="row">
                <div class="col">
                    <label for="nombre" class="form-label">Nombre:</label>
                    <input type="text" class="form-control" id="nombre" name="nombre" required>
                    <div class="invalid-feedback">
                        El campo NOMBRE es obligatorio.
                    </div>
                </div>
                <div class="col">
                    <label for="email" class="form-label">Email:</label>
                    <input type="email" class="form-control" id="email" name="email" required>
                </div>
            </div>
            <br>

            <div class="row">
                <div class="col">
                    <label for="contrasena" class="form-label">Contraseña:</label>
                    <input type="password" class="form-control" id="contrasena" name="contrasena" required>
                </div>
                <div class="col">
                    <label for="repetirContrasena" class="form-label">Repetir Contraseña:</label>
                    <input type="password" class="form-control" id="repetirContrasena" name="repetirContrasena"
                        required>
                </div>
            </div>
            <br>

            <button type="submit" class="btn btn-primary">Guardar</button>
        </form>
    </div>


</body>

</html>
